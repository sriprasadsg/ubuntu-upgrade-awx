---
- name: Universal TLS 1.3 Detection and Safe Enablement
  hosts: tls_targets
  become: yes
  gather_facts: yes

  vars:
    tls_port: 443
    openssl_min_version: "1.1.1"

  tasks:

    # --------------------------------------------------
    # 1. Check OpenSSL Version (OS capability)
    # --------------------------------------------------
    - name: Get OpenSSL version
      command: openssl version
      register: openssl_version

    - name: Fail if OpenSSL does not support TLS 1.3
      fail:
        msg: "TLS 1.3 NOT supported by OpenSSL: {{ openssl_version.stdout }}"
      when: openssl_version.stdout is not search("1.1.1|3.")

    # --------------------------------------------------
    # 2. Test TLS 1.3 on the target IP:PORT
    # --------------------------------------------------
    - name: Test TLS 1.3 handshake
      shell: |
        echo | timeout 5 openssl s_client \
        -connect {{ inventory_hostname }}:{{ tls_port }} -tls1_3 2>/dev/null | grep Protocol
      register: tls13_test
      ignore_errors: yes

    - name: Set TLS 1.3 status
      set_fact:
        tls13_enabled: "{{ 'TLSv1.3' in tls13_test.stdout }}"

    - name: Report TLS 1.3 status
      debug:
        msg: "TLS 1.3 enabled on {{ inventory_hostname }}:{{ tls_port }} → {{ tls13_enabled }}"

    # --------------------------------------------------
    # 3. Detect common TLS services
    # --------------------------------------------------
    - name: Detect running TLS services
      shell: |
        systemctl list-units --type=service --state=running | awk '{print $1}'
      register: running_services

    - name: Set known TLS services
      set_fact:
        known_tls_services: >-
          {{
            running_services.stdout_lines |
            select('match', 'nginx|apache2|haproxy') |
            list
          }}

    - name: Show detected TLS services
      debug:
        var: known_tls_services

    # --------------------------------------------------
    # 4. Enable TLS 1.3 ONLY for known services
    # --------------------------------------------------
    - name: Enable TLS 1.3 for NGINX
      block:
        - name: Ensure TLS config exists
          copy:
            dest: /etc/nginx/snippets/tls13.conf
            content: |
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers off;
          notify: reload nginx
      when:
        - not tls13_enabled
        - "'nginx.service' in known_tls_services"

    - name: Enable TLS 1.3 for Apache
      block:
        - name: Enable SSL module
          command: a2enmod ssl
        - name: Configure SSLProtocol
          lineinfile:
            path: /etc/apache2/mods-available/ssl.conf
            regexp: '^SSLProtocol'
            line: 'SSLProtocol all -TLSv1 -TLSv1.1'
          notify: reload apache
      when:
        - not tls13_enabled
        - "'apache2.service' in known_tls_services"

    - name: Enable TLS 1.3 for HAProxy
      block:
        - name: Ensure HAProxy TLS 1.3 defaults
          lineinfile:
            path: /etc/haproxy/haproxy.cfg
            regexp: '^ssl-default-bind-options'
            line: 'ssl-default-bind-options ssl-min-ver TLSv1.2'
          notify: reload haproxy
      when:
        - not tls13_enabled
        - "'haproxy.service' in known_tls_services"

    # --------------------------------------------------
    # 5. Final verification
    # --------------------------------------------------
    - name: Verify TLS 1.3 after changes
      shell: |
        echo | timeout 5 openssl s_client \
        -connect {{ inventory_hostname }}:{{ tls_port }} -tls1_3 2>/dev/null | grep Protocol
      register: tls13_verify
      ignore_errors: yes

    - name: Final TLS 1.3 Result
      debug:
        msg: "{{ tls13_verify.stdout | default('TLS 1.3 still NOT enabled') }}"

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded

    - name: reload apache
      service:
        name: apache2
        state: reloaded

    - name: reload haproxy
      service:
        name: haproxy
        state: reloaded
